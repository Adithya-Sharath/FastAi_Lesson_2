title: Car Damage Classifier
layout: page
---
<h2>Upload a car image to check for damage</h2>
<input id="photo" type="file">
<div id="results"></div>
<script>
  async function loaded(reader) {
    const response = await fetch('https://adugudu-fastailesson-2.hf.space/gradio_api/call/classify_image', {
      method: "POST",
      body: JSON.stringify({ "data": [reader.result] }),
      headers: { "Content-Type": "application/json" }
    });
    const json = await response.json();
    console.log("Step 1 response:", json);
    const eventId = json.event_id;
    const result = await fetch(`https://adugudu-fastailesson-2.hf.space/gradio_api/call/classify_image/${eventId}`);
    const text = await result.text();
    console.log("Step 2 raw text:", text);
    const data = JSON.parse(text.split('data: ')[1]);
    console.log("Parsed data:", data);
    const label = data[0]['label'];
    results.innerHTML = `<br/><img src="${reader.result}" width="300"><p><b>Result: ${label}</b></p>`
  }
  function read() {
    if(!photo.files[0]) return;
    const reader = new FileReader();
    reader.addEventListener('load', () => loaded(reader))
    reader.readAsDataURL(photo.files[0]);
  }
  photo.addEventListener('change', read);
</script>
