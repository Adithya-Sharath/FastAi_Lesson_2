---
title: Car Damage Classifier
layout: page
---

<style>
  .classifier-container {
    max-width: 500px;
    margin: 0 auto;
    text-align: center;
    font-family: sans-serif;
  }
  .upload-label {
    display: block;
    padding: 12px 24px;
    background: #2563eb;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    margin: 20px auto;
    width: fit-content;
  }
  .upload-label:hover { background: #1d4ed8; }
  #photo { display: none; }
  #status { color: #888; font-size: 14px; margin-top: 10px; }
  #result-image { border-radius: 8px; margin-top: 20px; max-width: 100%; }
  #result-label {
    font-size: 22px;
    font-weight: bold;
    margin-top: 12px;
    padding: 10px 20px;
    border-radius: 6px;
    display: inline-block;
  }
  .damaged { background: #fee2e2; color: #dc2626; }
  .nodamage { background: #dcfce7; color: #16a34a; }
</style>

<div class="classifier-container">
  <p>Upload a photo of a car to check if it has damage.</p>
  <label class="upload-label" for="photo">📷 Upload Car Image</label>
  <input id="photo" type="file" accept="image/*">
  <div id="status"></div>
  <div id="results"></div>
</div>

<script>
  async function loaded(reader) {
    const base64 = reader.result;
    document.getElementById('status').innerText = 'Analysing...';
    const response = await fetch('https://adugudu-fastailesson-2.hf.space/gradio_api/call/classify_image', {
      method: "POST",
      body: JSON.stringify({ "data": [{"url": base64, "meta": {"_type": "gradio.FileData"}}] }),
      headers: { "Content-Type": "application/json" }
    });
    const json = await response.json();
    const eventId = json.event_id;
    const result = await fetch(`https://adugudu-fastailesson-2.hf.space/gradio_api/call/classify_image/${eventId}`);
    const text = await result.text();
    const data = JSON.parse(text.split('data: ')[1]);
    const label = data[0]['label'];
    const isDamaged = label === 'car damage';
    document.getElementById('status').innerText = '';
    document.getElementById('results').innerHTML = `
      <img id="result-image" src="${base64}" width="300">
      <p><span class="result-label ${isDamaged ? 'damaged' : 'nodamage'}">
        ${isDamaged ? '⚠️ Damage Detected' : '✅ No Damage Detected'}
      </span></p>
    `;
  }
  function read() {
    if(!photo.files[0]) return;
    const reader = new FileReader();
    reader.addEventListener('load', () => loaded(reader));
    reader.readAsDataURL(photo.files[0]);
  }
  photo.addEventListener('change', read);
</script>
